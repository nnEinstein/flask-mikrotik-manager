{% extends "base.html" %}

{% block title %}Add Router - EINSTEIN{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-6">
    <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
        
        <div class="flex items-center space-x-3 mb-2">
            <i data-lucide="plus-circle" class="w-8 h-8 text-gray-900"></i>
            <h2 class="text-2xl font-bold text-gray-800">Add New Router</h2>
        </div>
        <p class="text-sm text-gray-500 mb-6">Masukkan informasi kredensial MikroTik Anda secara lengkap.</p>
        <hr class="border-gray-100 mb-6">

        <form method="POST" action="{{ url_for('add_router') }}">
            <div class="mb-4">
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Nama Router</label>
                <input type="text" id="name" name="name" placeholder="Contoh: Router Lantai 2" required 
                       class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
            </div>

            <div class="mb-4">
                <label for="ip" class="block text-sm font-semibold text-gray-700 mb-1">Mikrotik IP</label>
                <input type="text" id="ip" name="ip" placeholder="Contoh: 192.168.1.1 atau id-3.tunnel.my" required 
                       class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
            </div>

            <div class="mb-4">
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" placeholder="admin" required 
                       class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••"
                       class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
            </div>

            <div class="flex space-x-3 justify-end">
                <a href="{{ url_for('admin_setting') }}" class="px-5 py-2 border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition text-sm font-medium">
                    Batal
                </a>
                <button type="submit" class="px-5 py-2 bg-gray-900 hover:bg-gray-800 text-white rounded-lg transition text-sm font-medium shadow-sm">
                    Save Router
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
